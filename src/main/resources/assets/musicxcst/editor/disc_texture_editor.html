<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MusicXCST Disc Texture Editor</title>
<style>
:root{
  color-scheme:dark;
  --bg:#080b0e;--shell:#111820;--panel:#17212b;--panel2:#1d2a36;
  --line:#2d4050;--line2:#3d5568;--text:#e9f2f4;--muted:#94a8b5;
  --accent:#42d37a;--accent2:#49a8ff;--danger:#ff5d5d;--warn:#ffd166;
  font-family:Inter,Segoe UI,Arial,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0,#183024 0,#080b0e 36%,#07090c 100%);color:var(--text);overflow:hidden}
button,input,textarea{font:13px Inter,Segoe UI,Arial,sans-serif}
button{border:1px solid var(--line);background:linear-gradient(#243443,#1a2631);color:var(--text);border-radius:8px;padding:9px 11px;cursor:pointer;transition:transform .12s ease,border-color .12s ease,background .12s ease}
button:hover{border-color:#6da0bd;background:linear-gradient(#2b4052,#203141);transform:translateY(-1px)}
button.active{border-color:var(--accent);box-shadow:0 0 0 1px rgba(66,211,122,.35),inset 0 0 16px rgba(66,211,122,.08)}
button.primary{background:linear-gradient(135deg,#2ea95f,#2779c9);border-color:#65d88f;font-weight:700}
button.danger{border-color:#77404a;color:#ffd6d6}
.app{height:100vh;display:grid;grid-template-rows:48px 1fr 28px}
.top{display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(12,18,24,.88);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
.brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:.01em}
.mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#2dc76d,#3c8df2);box-shadow:0 0 22px rgba(66,211,122,.2)}
.tabs{display:flex;gap:4px;color:var(--muted)}
.tab{padding:7px 10px;border-radius:7px}
.tab.active{background:#1a2732;color:#fff}
.main{min-height:0;display:grid;grid-template-columns:60px minmax(460px,1fr) 360px;gap:0}
.tools{background:rgba(14,20,27,.92);border-right:1px solid var(--line);padding:12px 8px;display:flex;flex-direction:column;gap:8px}
.tool{width:44px;height:42px;padding:0;font-weight:800;font-size:15px}
.stage{min-width:0;display:grid;grid-template-rows:auto 1fr;gap:12px;padding:16px}
.stagebar{display:flex;align-items:center;justify-content:space-between;background:rgba(18,26,34,.82);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.stagebar .left{display:flex;align-items:center;gap:10px;color:var(--muted)}
.zoom{display:flex;align-items:center;gap:9px;color:var(--muted)}
input[type=range]{accent-color:var(--accent);width:160px}
.canvasShell{min-height:0;display:grid;place-items:center;background:linear-gradient(135deg,rgba(22,32,42,.78),rgba(9,13,18,.88));border:1px solid var(--line);border-radius:16px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.025),0 20px 80px rgba(0,0,0,.32);overflow:auto;padding:22px}
.canvasWrap{padding:18px;border-radius:14px;background:#0c1218;border:1px solid #263947;box-shadow:0 12px 40px rgba(0,0,0,.3)}
canvas{image-rendering:pixelated;display:block}
#grid{width:640px;height:640px;max-width:calc(100vw - 520px);max-height:calc(100vh - 190px);border:1px solid #354b5b;border-radius:8px;background:#0b1117;cursor:crosshair}
.side{min-width:0;background:rgba(16,24,32,.94);border-left:1px solid var(--line);padding:14px;display:flex;flex-direction:column;gap:12px;overflow:auto}
.panel{background:linear-gradient(180deg,rgba(29,42,54,.92),rgba(18,27,35,.92));border:1px solid var(--line);border-radius:14px;padding:13px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
.panel h2{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:#b7c8d1;margin:0 0 11px}
.texturePanel{display:grid;grid-template-columns:112px 1fr;gap:12px}
.previewBox{background:#0d141b;border:1px solid var(--line2);border-radius:12px;padding:8px}
#preview{width:96px;height:96px;border-radius:8px;border:1px solid #415b6f}
.themeGrid{display:grid;grid-template-columns:repeat(3,34px);gap:8px;margin-bottom:10px}
.theme{width:34px;height:34px;border-radius:9px;border:2px solid #0b1117;padding:0}
.theme.active{outline:2px solid #fff;outline-offset:1px}
.fieldRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
input[type=color]{width:48px;height:36px;padding:0;background:#0d141b;border:1px solid var(--line2);border-radius:9px}
input[type=text]{height:36px;min-width:96px;background:#0d141b;color:var(--text);border:1px solid var(--line2);border-radius:9px;padding:0 10px;text-transform:uppercase}
.palette{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:10px}
.swatch{height:24px;border-radius:7px;border:1px solid #405769;padding:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wide{grid-column:1/-1}
textarea{width:100%;height:122px;background:#0d141b;color:#dfeef4;border:1px solid var(--line2);border-radius:10px;padding:10px;resize:vertical;font:12px Consolas,monospace}
.hint{font-size:12px;line-height:1.4;color:var(--muted);margin-top:8px}
.status{font-size:12px;color:#b7c8d1;min-height:18px;margin-top:9px}
.status.ok{color:#76e39a}.status.bad{color:#ff8585}.status.warn{color:#ffd166}
.footer{display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:#0c1218;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
@media(max-width:980px){body{overflow:auto}.app{height:auto;min-height:100vh}.main{grid-template-columns:54px 1fr}.side{grid-column:1/-1;border-left:0;border-top:1px solid var(--line)}#grid{max-width:calc(100vw - 130px);max-height:none}.stage{min-height:620px}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><div class="mark"></div><div>MusicXCST Disc Texture Editor</div></div>
    <div class="tabs"><div class="tab active">Texture</div><div class="tab">Paint</div><div class="tab">Export</div></div>
  </header>
  <main class="main">
    <nav class="tools">
      <button id="brush" class="tool active" title="Brush (B)">B</button>
      <button id="eraser" class="tool" title="Eraser (E)">E</button>
      <button id="bucket" class="tool" title="Fill bucket (F)">F</button>
      <button id="picker" class="tool" title="Eyedropper (I)">I</button>
      <button id="line" class="tool" title="Line (L)">L</button>
      <button id="rect" class="tool" title="Rectangle (R)">R</button>
    </nav>
    <section class="stage">
      <div class="stagebar">
        <div class="left"><strong id="toolName">Brush</strong><span>16x16 ARGB</span></div>
        <div class="zoom"><span>Zoom</span><input id="zoom" type="range" min="24" max="56" value="40"><span id="zoomLabel">40px</span></div>
      </div>
      <div class="canvasShell"><div class="canvasWrap"><canvas id="grid" width="640" height="640"></canvas></div></div>
    </section>
    <aside class="side">
      <section class="panel">
        <h2>Texture</h2>
        <div class="texturePanel">
          <div class="previewBox"><canvas id="preview" width="96" height="96"></canvas></div>
          <div>
            <div id="themes" class="themeGrid"></div>
            <div class="fieldRow"><input id="color" type="color" value="#38bdf8"><input id="hex" type="text" value="#38BDF8" maxlength="7"></div>
            <div id="palette" class="palette"></div>
          </div>
        </div>
      </section>
      <section class="panel">
        <h2>Actions</h2>
        <div class="grid2">
          <button id="undo">Undo</button><button id="redo">Redo</button>
          <button id="clear" class="danger">Clear</button><button id="reset">Blueprint CD</button>
          <button id="transparent">Transparent</button><button id="applyTheme">Apply color</button>
          <button id="finish" class="primary wide">Finish and import</button>
        </div>
        <div id="status" class="status"></div>
      </section>
      <section class="panel">
        <h2>Design ID</h2>
        <textarea id="designId" spellcheck="false"></textarea>
        <div class="grid2" style="margin-top:8px"><button id="import">Import ID</button><button id="copy">Copy ID</button></div>
        <div class="hint">Finish sends the Design ID to Minecraft through localhost. If that fails, copy this ID and import it manually in the CD Writer.</div>
      </section>
    </aside>
  </main>
  <footer class="footer"><span>Local offline editor</span><span id="pixelInfo">Ready</span></footer>
</div>
<script>
const SIZE=16, PIXELS=SIZE*SIZE, PREFIX="MXCST1.", PALETTE_PREFIX="MXC1:", LEGACY_PREFIX="MXC16.";
const CHARS="0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-_";
const params=new URLSearchParams(location.search), callbackPort=params.get("port")||"", token=params.get("token")||"";
const grid=document.getElementById("grid"), ctx=grid.getContext("2d"), preview=document.getElementById("preview"), pctx=preview.getContext("2d");
const color=document.getElementById("color"), hex=document.getElementById("hex"), designBox=document.getElementById("designId"), statusBox=document.getElementById("status");
const zoom=document.getElementById("zoom"), zoomLabel=document.getElementById("zoomLabel"), pixelInfo=document.getElementById("pixelInfo");
const themeColors=["#FF0000","#FCFF00","#15FF00","#DF00FF","#009DFF","#3A4246"];
let pixels=decodeDesignId(params.get("design")||"")||blueprintPixels();
let tool="brush", dragging=false, startCell=null, activeTheme="", history=["#38BDF8","#EF4444","#FACC15","#22C55E","#D946EF","#0EA5E9","#3A4246","#FFFFFF"];
let undoStack=[], redoStack=[];
function blueprintPixels(){
  const rows=["................","................","................",".....AAAAA......","..AAABBBBBAAA...",".ABBBBCCCHBBBA..","ABHHBBCHHCBHBBA.","ABHBBHCCCBBBHBA.","ABBHBBDBBCHHBBA.","AEBBBHCCCBBBBEA.",".FEEEBBBBBEEEF..","..FFFEEEEEFFF...",".....EEEEE......","................","................","................"];
  const colors={A:0xff212121|0,B:0xff616161|0,C:0xff101010|0,D:0xff262626|0,E:0xff2f2f2f|0,F:0xff262626|0,H:0xffa6a6a6|0};
  const out=new Array(PIXELS).fill(0); for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++)out[y*SIZE+x]=colors[rows[y][x]]||0; return out;
}
function clone(){return pixels.slice()}
function pushUndo(){undoStack.push(clone()); if(undoStack.length>80)undoStack.shift(); redoStack=[]}
function restore(state){pixels=state.slice(); activeTheme=""; syncThemes(); redraw(); updateDesignBox()}
function undo(){if(!undoStack.length)return setStatus("Nothing to undo.","warn"); redoStack.push(clone()); restore(undoStack.pop()); setStatus("Undo.","ok")}
function redo(){if(!redoStack.length)return setStatus("Nothing to redo.","warn"); undoStack.push(clone()); restore(redoStack.pop()); setStatus("Redo.","ok")}
function cellFromEvent(e){const r=grid.getBoundingClientRect(); return {x:Math.max(0,Math.min(SIZE-1,Math.floor((e.clientX-r.left)/(r.width/SIZE)))),y:Math.max(0,Math.min(SIZE-1,Math.floor((e.clientY-r.top)/(r.height/SIZE))))}}
function drawPixel(c){const i=c.y*SIZE+c.x; if(tool==="picker"){const v=pixels[i]>>>0; if((v>>>24)!==0)setColor("#"+(v&0xffffff).toString(16).padStart(6,"0")); setTool("brush"); return} pixels[i]=tool==="eraser"?0:(0xff000000|parseInt(color.value.slice(1),16));}
function flood(start,target,replacement){if((target>>>0)===(replacement>>>0))return; const q=[start]; while(q.length){const i=q.pop(); if((pixels[i]>>>0)!==(target>>>0))continue; pixels[i]=replacement; const x=i%SIZE,y=Math.floor(i/SIZE); if(x>0)q.push(i-1); if(x<SIZE-1)q.push(i+1); if(y>0)q.push(i-SIZE); if(y<SIZE-1)q.push(i+SIZE)}}
function drawLine(a,b){let x0=a.x,y0=a.y,x1=b.x,y1=b.y,dx=Math.abs(x1-x0),sx=x0<x1?1:-1,dy=-Math.abs(y1-y0),sy=y0<y1?1:-1,err=dx+dy; while(true){drawPixel({x:x0,y:y0}); if(x0===x1&&y0===y1)break; const e2=2*err; if(e2>=dy){err+=dy;x0+=sx} if(e2<=dx){err+=dx;y0+=sy}}}
function drawRect(a,b){const minX=Math.min(a.x,b.x),maxX=Math.max(a.x,b.x),minY=Math.min(a.y,b.y),maxY=Math.max(a.y,b.y); for(let x=minX;x<=maxX;x++){drawPixel({x,y:minY});drawPixel({x,y:maxY})} for(let y=minY;y<=maxY;y++){drawPixel({x:minX,y});drawPixel({x:maxX,y})}}
function drawChecker(context,size){for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){context.fillStyle=((x+y)&1)?"#28313a":"#d7dde0";context.fillRect(x*size,y*size,size,size)}}
function redraw(){const cell=grid.width/SIZE; ctx.clearRect(0,0,grid.width,grid.height); drawChecker(ctx,cell); for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){const v=pixels[y*SIZE+x]>>>0;if((v>>>24)!==0){ctx.fillStyle="#"+(v&0xffffff).toString(16).padStart(6,"0");ctx.fillRect(x*cell,y*cell,cell,cell)} ctx.strokeStyle="rgba(255,255,255,.09)";ctx.strokeRect(x*cell,y*cell,cell,cell)} drawPreview(); pixelInfo.textContent=`${pixels.filter(p=>(p>>>24)!==0).length} painted pixels`}
function drawPreview(){const cell=preview.width/SIZE; pctx.clearRect(0,0,preview.width,preview.height); drawChecker(pctx,cell); for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){const v=pixels[y*SIZE+x]>>>0;if((v>>>24)!==0){pctx.fillStyle="#"+(v&0xffffff).toString(16).padStart(6,"0");pctx.fillRect(x*cell,y*cell,cell,cell)}}}
function setTool(next){tool=next; document.getElementById("toolName").textContent=next[0].toUpperCase()+next.slice(1); for(const id of ["brush","eraser","bucket","picker","line","rect"])document.getElementById(id).classList.toggle("active",id===next)}
function setColor(value){const v=value.startsWith("#")?value:"#"+value; if(!/^#[0-9a-fA-F]{6}$/.test(v))return false; color.value=v; hex.value=v.toUpperCase(); remember(v); return true}
function remember(v){const up=v.toUpperCase(); history=[up,...history.filter(x=>x!==up)].slice(0,8); renderPalette()}
function renderPalette(){const p=document.getElementById("palette"); p.innerHTML=""; history.forEach(v=>{const b=document.createElement("button");b.className="swatch";b.style.background=v;b.title=v;b.onclick=()=>setColor(v);p.appendChild(b)})}
function renderThemes(){const t=document.getElementById("themes"); t.innerHTML=""; themeColors.forEach(v=>{const b=document.createElement("button");b.className="theme";b.style.background=v;b.dataset.color=v;b.onclick=()=>applyTheme(v);t.appendChild(b)}); syncThemes()}
function syncThemes(){document.querySelectorAll(".theme").forEach(b=>b.classList.toggle("active",b.dataset.color===activeTheme))}
function applyTheme(v){pushUndo(); setColor(v); pixels=blueprintPixels().map(p=>recolorPixel(p,parseInt(v.slice(1),16))); activeTheme=v; syncThemes(); redraw(); updateDesignBox(); setStatus("Blueprint CD recolored.","ok")}
function recolorPixel(pixel,rgb){const p=pixel>>>0;if((p>>>24)===0)return 0;const shade=p&0xffffff;const map={0x101010:.84,0x212121:.72,0x262626:.62,0x2f2f2f:.54,0x616161:.22}; if(shade===0xa6a6a6)return 0xff000000|mix(rgb,0xffffff,.42); return 0xff000000|mix(rgb,0x000000,map[shade]??0)}
function mix(rgb,other,a){const s=1-a,r=Math.round(((rgb>>16)&255)*s+((other>>16)&255)*a),g=Math.round(((rgb>>8)&255)*s+((other>>8)&255)*a),b=Math.round((rgb&255)*s+(other&255)*a);return(r<<16)|(g<<8)|b}
function encodeDesignId(data=pixels){const bytes=new Uint8Array(1+PIXELS*4); bytes[0]=SIZE; const view=new DataView(bytes.buffer); data.forEach((p,i)=>view.setInt32(1+i*4,((p>>>24)===0?0:(0xff000000|(p&0xffffff))),false)); return PREFIX+btoa(String.fromCharCode(...bytes)).replaceAll("+","-").replaceAll("/","_").replace(/=+$/,"")}
function decodeDesignId(id){if(!id||id.length>1500)return null; id=id.trim(); if(id.startsWith(PREFIX)){try{let s=id.slice(PREFIX.length).replaceAll("-","+").replaceAll("_","/"); while(s.length%4)s+="="; const bin=atob(s); if(bin.length!==1+PIXELS*4||bin.charCodeAt(0)!==SIZE)return null; const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0)); const view=new DataView(bytes.buffer); return Array.from({length:PIXELS},(_,i)=>{const v=view.getInt32(1+i*4,false);return((v>>>24)===0)?0:(0xff000000|(v&0xffffff))})}catch(e){return null}} if(id.startsWith(PALETTE_PREFIX))return decodePalette(id); if(id.startsWith(LEGACY_PREFIX))return decodeLegacy(id); return null}
function decodePalette(id){try{const cut=id.indexOf(";"); if(cut<0)return null; const pal=id.slice(PALETTE_PREFIX.length,cut).split(",").filter(Boolean); const body=id.slice(cut+1); if(body.length!==PIXELS||pal.length>CHARS.length)return null; return [...body].map(ch=>{if(ch==="."||ch===" ")return 0; const i=CHARS.indexOf(ch); if(i<0||i>=pal.length)throw Error(); return 0xff000000|parseInt(pal[i],16)})}catch(e){return null}}
function decodeLegacy(id){try{let s=id.slice(LEGACY_PREFIX.length).replaceAll("-","+").replaceAll("_","/"); while(s.length%4)s+="="; const bin=atob(s); if(bin.length!==PIXELS*4)return null; const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0)); const view=new DataView(bytes.buffer); return Array.from({length:PIXELS},(_,i)=>{const v=view.getInt32(i*4,false);return((v>>>24)===0)?0:(0xff000000|(v&0xffffff))})}catch(e){return null}}
function updateDesignBox(){designBox.value=encodeDesignId()}
function setStatus(text,type=""){statusBox.textContent=text; statusBox.className="status "+type}
async function finish(){const id=encodeDesignId(); designBox.value=id; try{await navigator.clipboard.writeText(id)}catch(e){} if(!callbackPort||!token)return setStatus("Design ID copied. Paste it into Minecraft if needed.","warn"); try{const r=await fetch(`http://127.0.0.1:${callbackPort}/finish`,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams({token,design:id}).toString()}); if(!r.ok)throw new Error(await r.text()); closeCountdown()}catch(e){setStatus("Automatic import failed. Copy this Design ID and press Import in Minecraft.","bad")}}
function closeCountdown(){let n=5; const tick=()=>{setStatus(`Design imported into Minecraft. Closing in ${n}...`,"ok"); if(n--<=0){window.close(); setTimeout(()=>setStatus("Design imported into Minecraft. You can close this tab now.","ok"),300); return} setTimeout(tick,1000)}; tick()}
grid.onmousedown=e=>{dragging=true; startCell=cellFromEvent(e); if(tool==="bucket"){pushUndo(); const i=startCell.y*SIZE+startCell.x; flood(i,pixels[i],0xff000000|parseInt(color.value.slice(1),16)); activeTheme=""; syncThemes(); redraw(); updateDesignBox()} else if(tool==="brush"||tool==="eraser"||tool==="picker"){pushUndo(); drawPixel(startCell); activeTheme=""; syncThemes(); redraw(); updateDesignBox()}};
grid.onmousemove=e=>{if(!dragging||!(tool==="brush"||tool==="eraser"))return; drawPixel(cellFromEvent(e)); activeTheme=""; syncThemes(); redraw(); updateDesignBox()};
window.onmouseup=e=>{if(!dragging)return; const end=cellFromEvent(e); if(tool==="line"&&startCell){pushUndo(); drawLine(startCell,end); redraw(); updateDesignBox()} if(tool==="rect"&&startCell){pushUndo(); drawRect(startCell,end); redraw(); updateDesignBox()} dragging=false; startCell=null};
["brush","eraser","bucket","picker","line","rect"].forEach(id=>document.getElementById(id).onclick=()=>setTool(id));
document.getElementById("undo").onclick=undo; document.getElementById("redo").onclick=redo; document.getElementById("clear").onclick=()=>{pushUndo(); pixels.fill(0); activeTheme=""; syncThemes(); redraw(); updateDesignBox(); setStatus("Canvas cleared.","ok")};
document.getElementById("reset").onclick=()=>{pushUndo(); pixels=blueprintPixels(); activeTheme=""; syncThemes(); redraw(); updateDesignBox(); setStatus("Reset to Blueprint CD.","ok")};
document.getElementById("transparent").onclick=()=>setTool("eraser"); document.getElementById("applyTheme").onclick=()=>applyTheme(color.value); document.getElementById("finish").onclick=finish;
document.getElementById("copy").onclick=async()=>{updateDesignBox(); try{await navigator.clipboard.writeText(designBox.value); setStatus("Design ID copied.","ok")}catch(e){setStatus("Design ID ready to copy manually.","warn")}};
document.getElementById("import").onclick=()=>{const decoded=decodeDesignId(designBox.value); if(!decoded)return setStatus("Invalid or corrupt Design ID.","bad"); pushUndo(); pixels=decoded; activeTheme=""; syncThemes(); redraw(); updateDesignBox(); setStatus("Design ID imported.","ok")};
color.oninput=()=>{setColor(color.value); activeTheme=""; syncThemes()}; hex.onchange=()=>{if(!setColor(hex.value))setStatus("Invalid HEX color.","bad")};
zoom.oninput=()=>{const size=Number(zoom.value); grid.style.width=`${size*SIZE}px`; grid.style.height=`${size*SIZE}px`; zoomLabel.textContent=`${size}px`};
window.addEventListener("keydown",e=>{if(e.ctrlKey&&e.key.toLowerCase()==="z"&&!e.shiftKey){e.preventDefault();undo()} else if((e.ctrlKey&&e.key.toLowerCase()==="y")||(e.ctrlKey&&e.shiftKey&&e.key.toLowerCase()==="z")){e.preventDefault();redo()} else if(!e.ctrlKey){const k=e.key.toLowerCase(); if(k==="b")setTool("brush"); if(k==="e")setTool("eraser"); if(k==="f")setTool("bucket"); if(k==="i")setTool("picker"); if(k==="l")setTool("line"); if(k==="r")setTool("rect")}})
renderThemes(); renderPalette(); updateDesignBox(); redraw(); setStatus("Ready.","ok");
</script>
</body>
</html>
